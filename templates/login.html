<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — LIS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: #0d3b66;
      display: flex; align-items: center;
      justify-content: center; min-height: 100vh;
    }
    .login-card { width: 100%; max-width: 420px; border-radius: 12px; overflow: hidden; box-shadow: 0 16px 40px rgba(0,0,0,.3); }
    .login-header { background: #1a7abf; color: #fff; padding: 2rem; text-align: center; }
    .login-body   { background: #fff; padding: 2rem; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <i class="bi bi-activity fs-1"></i>
    <h4 class="mt-2 mb-0">Laboratory Information System</h4>
    <small class="opacity-75">Sign in to continue</small>
  </div>
  <div class="login-body">
    {% if error %}
    <div class="alert alert-danger">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login/">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control"
                 placeholder="Enter username" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control"
                 placeholder="Enter password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
